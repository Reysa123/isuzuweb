<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Supabase</title>
    <!-- Load Supabase SDK -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .container { max-width: 400px; width: 100%; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .toggle-btn { background: none; color: #007bff; border: none; cursor: pointer; text-decoration: underline; margin-top: 10px; width: auto;}
    </style>
</head>
<body>

<div class="container">
    <h2 id="form-title">Login</h2>
    <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Kata Sandi" required>
        <button type="submit" id="submit-btn">Masuk</button>
    </form>
    <button class="toggle-btn" onclick="toggleMode()">Belum punya akun? Daftar</button>
    <p id="message"></p>
</div>

<script>
    // 1. Inisialisasi Supabase (Ganti URL dan Anon Key Anda di sini)
    const SUPABASE_URL = 'https://ISI_URL_SUPABASE_ANDA.supabase.co';
    const SUPABASE_ANON_KEY = 'ISI_ANON_KEY_ANDA_DI_SINI';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('form-title').textContent = isLogin ? 'Login' : 'Daftar';
        document.getElementById('submit-btn').textContent = isLogin ? 'Masuk' : 'Daftar';
        document.querySelector('.toggle-btn').textContent = isLogin ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Login';
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageEl = document.getElementById('message');

        if (isLogin) {
            // Proses Login
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) messageEl.textContent = 'Error: ' + error.message;
            else {
                messageEl.style.color = 'green';
                messageEl.textContent = 'Login berhasil! Mengalihkan...';
                // Arahkan ke halaman dashboard atau index setelah login berhasil
            }
        } else {
            // Proses Registrasi
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) messageEl.textContent = 'Error: ' + error.message;
            else {
                messageEl.style.color = 'green';
                messageEl.textContent = 'Daftar berhasil! Silakan cek email untuk verifikasi.';
            }
        }
    });
</script>

</body>
